name: 'Nitpick Senior'
description: 'Um, actually... AI-powered code review that catches what you missed'
author: 'datarootsio'

inputs:
  provider:
    description: 'Git provider (github, azure_devops, gitlab, bitbucket). Auto-detected if not specified.'
    required: false
    default: ''

  token:
    description: 'Authentication token for the Git provider'
    required: false
    default: ''

  github_token:
    description: 'GitHub token for PR access (backward compatible alias for token)'
    required: false
    default: ''

  llm_provider:
    description: 'LLM provider (openai, anthropic, google, azure, azure_foundry_anthropic, azure_foundry_openai, openrouter)'
    required: true

  model:
    description: 'Model name (e.g., gpt-4o, claude-sonnet-4-6, gemini-2.5-flash)'
    required: true

  agent_spec_path:
    description: 'Path to agent spec file defining review behavior'
    required: false
    default: '.github/ai-reviewer.md'

  post_summary:
    description: 'Post PR summary comment'
    required: false
    default: 'true'

  post_inline_comments:
    description: 'Post inline code review comments'
    required: false
    default: 'true'

  max_comments:
    description: 'Maximum inline comments to post'
    required: false
    default: '10'

  min_severity:
    description: 'Minimum severity to post (error, warning, info)'
    required: false
    default: 'warning'

  resolve_outdated:
    description: 'Resolve outdated review comments from previous runs'
    required: false
    default: 'true'

  context_enabled:
    description: 'Include repository context (README, imported files) in review'
    required: false
    default: 'true'

  context_max_tokens:
    description: 'Maximum tokens for repository context'
    required: false
    default: '5000'

  static_analysis_file:
    description: 'Path to semgrep JSON output file for static analysis findings'
    required: false
    default: ''

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    INPUT_PROVIDER: ${{ inputs.provider }}
    INPUT_TOKEN: ${{ inputs.token }}
    INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
    INPUT_LLM_PROVIDER: ${{ inputs.llm_provider }}
    INPUT_MODEL: ${{ inputs.model }}
    INPUT_AGENT_SPEC_PATH: ${{ inputs.agent_spec_path }}
    INPUT_POST_SUMMARY: ${{ inputs.post_summary }}
    INPUT_POST_INLINE_COMMENTS: ${{ inputs.post_inline_comments }}
    INPUT_MAX_COMMENTS: ${{ inputs.max_comments }}
    INPUT_MIN_SEVERITY: ${{ inputs.min_severity }}
    INPUT_RESOLVE_OUTDATED: ${{ inputs.resolve_outdated }}
    INPUT_CONTEXT_ENABLED: ${{ inputs.context_enabled }}
    INPUT_CONTEXT_MAX_TOKENS: ${{ inputs.context_max_tokens }}
    INPUT_STATIC_ANALYSIS_FILE: ${{ inputs.static_analysis_file }}

branding:
  icon: 'eye'
  color: 'orange'
