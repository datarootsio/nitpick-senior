name: Nitpick Senior Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        uses: docker://semgrep/semgrep:latest
        with:
          args: semgrep scan --config auto --json-output=semgrep.json

      - name: Show Semgrep Results
        run: cat semgrep.json | head -50 || echo "No findings"

      - name: Nitpick Senior
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: google/gemini-2.5-flash
          static_analysis_file: semgrep.json
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
